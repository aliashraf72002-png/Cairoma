<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAIROMA | Feedback</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="container">
        <header class="header">
            <h1 class="logo">CAIROMA</h1>
            <p class="welcome-text">
                Welcome to CAIROMA. We hope you enjoyed your experience.<br>
                Please take a moment to share your feedback with us.
            </p>
        </header>

        <section class="form-card">
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="feedback">Your Feedback</label>
                    <textarea id="feedback" name="feedback" placeholder="How was your meal and service?" rows="5" required></textarea>
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">Submit Feedback</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="successMessage" class="success-message hidden">
                <div class="success-icon">✓</div>
                <p>Thank you for your feedback. We truly appreciate your opinion.</p>
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2023 CAIROMA Fine Dining. All rights reserved.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
